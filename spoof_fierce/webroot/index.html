function mc(){document.querySelectorAll('.ov').forEach(function(o){o.classList.remove('show');});}
function go(id,el){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});document.getElementById('p-'+id).classList.add('active');el.classList.add('active');if(id==='games')renderGL();if(id==='settings'){ldDev();ldLog();}}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'):'';}

function isValidPkg(p){return typeof p==='string'&&p.indexOf('.')>0&&p.indexOf(' ')===-1;}

function iconUrl(pkg){
  if(typeof ksu!=='undefined'&&typeof ksu.listPackages!=='undefined')return 'ksu://icon/'+pkg;
  return '';
}

function fallbackIcon(el,pkg){
  var s=pkg.split('.').pop();
  el.innerHTML='<span class="fallback">'+s.substring(0,2).toUpperCase()+'</span>';
}

// ksu.exec with callback + timeout (matches Encore's tt() pattern exactly)
var _cbIdx=0;
function execCmd(cmd){
  return new Promise(function(resolve){
    if(typeof ksu==='undefined'||typeof ksu.exec==='undefined'){
      resolve({errno:-1,stdout:'',stderr:'ksu.exec not available'});return;
    }
    var cbId='exec_callback_'+Date.now()+'_'+(_cbIdx++);
    window[cbId]=function(errno,stdout,stderr){
      delete window[cbId];
      resolve({errno:errno,stdout:stdout,stderr:stderr});
    };
    try{ksu.exec(cmd,'{}',cbId);}
    catch(e){delete window[cbId];resolve({errno:-1,stdout:'',stderr:e.message});}
    // 15s timeout (some commands take longer)
    setTimeout(function(){
      if(window[cbId]){
        delete window[cbId];
        resolve({errno:-1,stdout:'',stderr:'execCmd timeout: '+cmd});
      }
    },15000);
  });
}

function fetchJSON(file){
  return fetch(file+'?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return null;});
}

async function loadStatus(){
  S=await fetchJSON('status.json');
  if(!S)S={packages:[]};
  if(!S.packages)S.packages=[];
  S.packages=S.packages.filter(isValidPkg);

  var on=S.active===true;
  document.getElementById('h-badge').textContent=on?'ACTIVE':'STANDBY';
  document.getElementById('h-badge').className='badge '+(on?'badge-on':'badge-off');

  var real=S.real||{};
  var displayName=real.marketname||real.model||'?';
  document.getElementById('h-real-model').textContent=displayName;
  var chip=real.chip||'';
  document.getElementById('h-real-sub').textContent=(real.brand||'?')+' \u00b7 '+chip;

  var realRows=[
    {l:'Device',v:real.device,k:'Device'},
    {l:'Model',v:real.model,k:'Model'},
    {l:'Brand',v:real.brand,k:'Brand'},
    {l:'Chipset',v:chip,k:'Chipset'},
    {l:'Android',v:real.android,k:'Android'},
    {l:'Security Patch',v:real.patch,k:'Patch'},
    {l:'Build',v:real.build,k:'Build'},
    {l:'Kernel',v:real.kernel,k:'Kernel'}
  ];
  var rh='';realRows.forEach(function(r){
    if(!r.v)return;
    var icon=DEVICE_ICONS[r.k]||'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="var(--dim)"/></svg>';
    rh+='<div class="info-row"><div class="icon">'+icon+'</div><div class="text"><div class="label">'+r.l+'</div><div class="value">'+esc(r.v)+'</div></div></div>';
  });
  document.getElementById('h-real-info').innerHTML=rh;

  var targetEl=document.getElementById('h-target-info');
  var targetTitleEl=document.getElementById('h-target-title');
  var hasTarget=!!(S.marketname||S.model);
  if(!hasTarget){
    targetTitleEl.style.display='none';
    targetEl.style.display='none';
  }else{
    targetTitleEl.style.display='';
    targetEl.style.display='';
    var targetRows=[
      {l:'Target',v:S.marketname||S.model,k:'Target'},
      {l:'Model',v:S.model,k:'Model'},
      {l:'Brand',v:S.brand,k:'Brand'},
      {l:'Board',v:S.board,k:'Board'},
      {l:'FPS',v:(S.fps||'?')+'fps',k:'FPS'}
    ];
    var th='';targetRows.forEach(function(r){
      if(!r.v)return;
      var icon=SPOOF_ICONS[r.k]||'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="var(--dim)"/></svg>';
      th+='<div class="info-row"><div class="icon">'+icon+'</div><div class="text"><div class="label">'+r.l+'</div><div class="value">'+esc(r.v)+'</div></div></div>';
    });
    targetEl.innerHTML=th;
  }
}

function renderGL(){
  var el=document.getElementById('gList');var pkgs=S.packages||[];
  var q=(document.getElementById('gSearch').value||'').toLowerCase();
  var f=pkgs.filter(function(p){return !q||p.toLowerCase().indexOf(q)!==-1;});
  if(!f.length){el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg><br>'+(q?'No match':'No games added')+'</div>';return;}
  el.innerHTML=f.map(function(p){
    var s=p.split('.').pop();
    var ico=iconUrl(p);
    var imgHtml=ico?'<img src="'+ico+'" onerror="fallbackIcon(this,\''+esc(p)+'\')">':'<span class="fallback">'+s.substring(0,2).toUpperCase()+'</span>';
    return '<div class="game-card"><div class="app-icon">'+imgHtml+'</div><div class="game-info"><div class="name">'+esc(s)+'</div><div class="pkg">'+esc(p)+'</div></div><div class="game-badge">ON</div><button class="game-rm" onclick="doRm(\''+esc(p)+'\')"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div>';
  }).join('');
}

async function doApplyAll(){
  if(!S.packages||!S.packages.length){ts('No games');return;}
  for(var i=0;i<S.packages.length;i++){
    await execCmd('sh '+M+'/api.sh apply '+S.packages[i]);
  }
  ts('Applied all');setTimeout(loadStatus,500);
}
async function doRestore(){
  await execCmd('sh '+M+'/api.sh restore');
  ts('Restored');setTimeout(loadStatus,500);
}
async function doRm(p){
  if(!confirm('Remove '+p+'?'))return;
  await execCmd('sh '+M+'/api.sh remove '+p);
  ts('Removed');setTimeout(loadStatus,500);
}

async function listAppsKSU(){
  try{
    if(typeof ksu!=='undefined'&&typeof ksu.listUserPackages!=='undefined'){
      var raw=ksu.listUserPackages();
      var pkgs=typeof raw==='string'?JSON.parse(raw):raw;
      if(pkgs&&pkgs.length){
        var labels={};
        try{
          var chunk=50;
          for(var i=0;i<pkgs.length;i+=chunk){
            var slice=pkgs.slice(i,i+chunk);
            var infoRaw=ksu.getPackagesInfo(JSON.stringify(slice));
            var infos=typeof infoRaw==='string'?JSON.parse(infoRaw):infoRaw;
            for(var j=0;j<infos.length;j++){
              labels[infos[j].packageName]=infos[j].appLabel||infos[j].packageName;
            }
          }
        }catch(e){}
        return pkgs.map(function(p){return{pkg:p,name:labels[p]||p.split('.').pop()};});
      }
    }
  }catch(e){}
  return null;
}

async function listAppsShell(){
  var result=[];
  var res=await execCmd('pm list packages -3');
  if(res.errno===0&&res.stdout){
    var lines=res.stdout.split('\n');
    for(var i=0;i<lines.length;i++){
      var line=lines[i].trim();
      if(line.indexOf('package:')===0){
        var pkg=line.substring(8);
        if(isValidPkg(pkg))result.push({pkg:pkg,name:pkg.split('.').pop()});
      }
    }
  }
  return result;
}

async function openPicker(){
  sel={};document.getElementById('pSearch').value='';document.getElementById('ov-pick').classList.add('show');
  document.getElementById('pList').innerHTML='<div class="empty">Loading apps...</div>';
  allApps=await listAppsKSU();
  if(!allApps||!allApps.length){
    var apps=await fetchJSON('apps.json');
    allApps=(apps&&apps.length)?apps:[];
  }
  if(!allApps||!allApps.length){
    document.getElementById('pList').innerHTML='<div class="empty">Scanning via shell...</div>';
    allApps=await listAppsShell();
  }
  renderPL();
}
function renderPL(){
  var q=(document.getElementById('pSearch').value||'').toLowerCase();
  var list=allApps.filter(function(a){return a.pkg&&(!q||a.name.toLowerCase().indexOf(q)!==-1||a.pkg.toLowerCase().indexOf(q)!==-1);});
  var el=document.getElementById('pList');
  if(!list.length){el.innerHTML='<div class="empty">No apps found</div>';return;}
  el.innerHTML=list.slice(0,300).map(function(a){
    var done=(S.packages||[]).indexOf(a.pkg)!==-1;var s=sel[a.pkg];
    var ico=iconUrl(a.pkg);
    var imgHtml=ico?'<img src="'+ico+'" onerror="fallbackIcon(this,\''+esc(a.pkg)+'\')">':'<span class="fallback">'+a.pkg.split('.').pop().substring(0,2).toUpperCase()+'</span>';
    return '<div class="pick-item'+(done?' done':s?' sel':'')+'" onclick="'+(done?'':'tg(\''+esc(a.pkg)+'\')')+'"><div class="pick-icon">'+imgHtml+'</div><div class="pick-info"><div class="n">'+esc(a.name)+'</div><div class="p">'+esc(a.pkg)+'</div></div><div class="pick-check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>';
  }).join('');
}
function tg(pkg){if((S.packages||[]).indexOf(pkg)!==-1)return;sel[pkg]=sel[pkg]?undefined:true;renderPL();}
async function addSel(){
  var pkgs=Object.keys(sel).filter(function(k){return sel[k];});
  if(!pkgs.length){ts('No app selected');return;}
  mc();
  for(var i=0;i<pkgs.length;i++){
    await execCmd('sh '+M+'/api.sh add '+pkgs[i]);
  }
  ts('Added '+pkgs.length);
  await new Promise(function(r){setTimeout(r,500);});
  loadStatus();
}

function openDevPicker(){
  document.getElementById('ov-dev').classList.add('show');
  document.getElementById('dList').innerHTML=DEVICES.map(function(d,i){return '<div class="dev-card" onclick="pickDev('+i+')"><div class="dn">'+d.n+'</div><div class="dc">'+d.c+' \u00b7 '+d.fps+'fps</div><div class="df">'+d.mk+'</div></div>';}).join('');
}
async function pickDev(i){
  var d=DEVICES[i];if(!d)return;
  var cfg={brand:d.mf,manufacturer:d.mf,model:d.mo,device:d.d,product:d.d,fingerprint:d.mf+'/'+d.d+'/'+d.d+':14/UP1A:release-keys',board:d.b,hardware:d.hw,marketname:d.mk,android_version:'14',sdk_int:34,fps:d.fps,packages:S.packages||[]};
  await execCmd('sh '+M+'/api.sh set_device "'+JSON.stringify(cfg).replace(/"/g,'\\"')+'"');
  mc();ts('Device: '+d.n);
  await new Promise(function(r){setTimeout(r,500);});
  loadStatus();
}

function ldDev(){
  document.getElementById('s-dev').innerHTML='<div class="info-row" style="border-color:var(--accent)"><div class="icon"><svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z" fill="var(--accent)"/></svg></div><div class="text"><div class="label">Current Target</div><div class="value">'+esc(S.marketname||S.model||'?')+' \u00b7 '+(S.fps||'?')+'fps</div></div></div>';
}

async function ldLog(){
  var res=await execCmd('sh '+M+'/api.sh log');
  document.getElementById('s-log').textContent=res.stdout||'No log';
}

loadStatus();
</script>
